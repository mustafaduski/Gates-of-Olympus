<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gates of Olympus - Canvas Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="balance-box">
                <span class="label">Balance</span>
                <span class="value" id="balance">1000</span>
            </div>
            <div class="bet-box">
                <span class="label">Bet</span>
                <div class="bet-controls">
                    <button class="bet-btn" id="decreaseBet">-</button>
                    <span class="value" id="currentBet">10</span>
                    <button class="bet-btn" id="increaseBet">+</button>
                </div>
            </div>
            <div class="win-box" id="winAmount">0</div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="multiplier-indicator" id="multiplier">1x</div>
            <button class="spin-btn" id="spinBtn">SPIN</button>
        </div>

        <div class="paytable">
            <div class="paytable-title">Paytable</div>
            <div class="symbols-grid" id="paytableGrid"></div>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="game.js"></script>
</body>
</html>
